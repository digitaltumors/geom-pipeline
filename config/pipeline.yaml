# Pipeline directory layout
paths:
  raw_dir: data/rawdata
  proc_dir: data/procdata
  results_dir: data/results

dataset:
  # Stable identifier used in final result filenames
  id: geom
  version: v2.0.0
  # GEOM subsets to process
  subsets:
    - drugs
    # - qm9
    # - moleculenet

selection:
  # Set to null to process every compound in each selected subset
  max_compounds_per_subset: null

sources:
  # GEOM RDKit conformer archive
  rdkit_url: https://dataverse.harvard.edu/api/access/datafile/4327252
  # Optional MoleculeNet archive
  moleculenet_url: https://dataverse.harvard.edu/api/access/datafile/5858506

# Base AnnotationDB API URL
# The workflow appends /compound/all
annotationdb_api: https://v2annotationdb.bhklab.ca
