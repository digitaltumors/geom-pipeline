[workspace]
name = "geom-pipeline"
authors = [
    "James Bannon <bhklab.jamesbannon@gmail.com>",
    "Michael Tran <michaelcao-anh.tran@uhn.ca>",
]
description = "Pipeline to curate GEOM 3D structures into analysis-ready tabular outputs"
license = "MIT"
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]
version = "2.0.0"

[dependencies]
python = ">=3.12,<3.13"
snakemake = ">=9.17.1,<10"
ruff = ">=0.15.5,<0.16"
rdkit = ">=2025.3.5,<2026"
numpy = ">=2.3,<3"
pandas = ">=2.3,<3"
ijson = ">=3.5.0,<4"
r-base = ">=4.5,<4.6"
r-arrow = "*"
r-httr2 = "*"
r-jsonlite = "*"
r-knitr = "*"
r-rmarkdown = "*"
r-yaml = "*"
pandoc = "*"
bioconductor-multiassayexperiment = "*"
bioconductor-summarizedexperiment = "*"
bioconductor-s4vectors = "*"
ty = ">=0.0.24,<0.0.25"

[tasks]
qc = "Rscript -e \"rmarkdown::render('qc/geom_qc.Rmd', output_dir = 'qc', knit_root_dir = getwd())\""
